name: Run Naukri Automation Every Hour

on:
  schedule:
    - cron: '0 * * * *'  # Run every 1 hour
  workflow_dispatch:     # Allow manual trigger from GitHub UI

jobs:
  naukri-automation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install
      
      - name: Run Naukri automation
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: python naukri_login.py
      
      - name: Upload logs (if error)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: automation-logs
          retention-days: 7
